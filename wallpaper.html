<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ゴルフ日本語 — kana wallpaper</title>
<style>
  /* Dark inversion of the app palette (index.html :root) so it sits quietly on a desktop */
  :root{
    --bg:#1B1E1A; --cell:#22261F; --line:#31362D;
    --ink:#E9E7DD; --ink-soft:#8B9080; --accent:#8FB89A; --gold:#CDB98A;
    --jp:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
    --ui:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--ui);overflow:hidden}
  #board{display:flex;justify-content:center;align-items:flex-start;gap:70px;padding:70px 60px 40px}
  .set h2{font-family:var(--jp);font-size:22px;font-weight:400;color:var(--gold);margin-bottom:4px}
  .set .sub{font-size:12px;color:var(--ink-soft);margin-bottom:14px}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
  .cell{background:var(--cell);border:1px solid var(--line);border-radius:9px;padding:8px 6px 7px;text-align:center}
  .cell.blank{visibility:hidden}
  .cell .k{font-family:var(--jp);font-size:24px;display:block;line-height:1.15}
  .cell .r{font-family:var(--mono);font-size:10px;color:var(--accent);display:block}
  .cell .w{font-family:var(--jp);font-size:12px;display:block;margin-top:4px;line-height:1.25;color:var(--ink)}
  .cell .wg{font-size:9px;color:var(--ink-soft);display:block;line-height:1.3}
  /* nowords: characters only, sized to fill a 2560x1440 design at zoom 2 */
  body.nowords .cell .w,body.nowords .cell .wg{display:none}
  body.nowords .cell .k{font-size:40px}
  body.nowords .cell .r{font-size:12px}
  body.nowords .set{width:1080px}
  body.nowords #board{justify-content:space-evenly}
  /* phone: single set, big top spacer so the lock-screen clock has room */
  body.phone #board{padding:250px 18px 30px;gap:0}
  body.phone .set{width:100%}
  body.phone .grid{gap:6px}
  body.phone .cell{padding:7px 2px 6px;border-radius:8px}
  body.phone .cell .k{font-size:30px}
  body.phone .cell .r{font-size:11px}
  body.phone .cell .w,body.phone .cell .wg{display:none}
  body.phone .set h2{font-size:15px;text-align:center}
  body.phone .set .sub{text-align:center;margin-bottom:8px}
</style>
</head>
<body>
<div id="board"></div>
<script src="kana-data.js"></script>
<script>
"use strict";
const q=new URLSearchParams(location.search);
const sets=(q.get("sets")||"kata,hira").split(",");
if(q.get("phone"))document.body.classList.add("phone");
if(q.get("nowords"))document.body.classList.add("nowords");
if(q.get("zoom"))document.body.style.zoom=q.get("zoom");
const wordRomaji=w=>tokenize(w).map(t=>t.gap?" ":t.r).join("");
const META={kata:{data:KATA,t:"カタカナ",sub:"katakana — loanwords: golf, food, hotels"},
            hira:{data:HIRA,t:"ひらがな",sub:"hiragana — native words + grammar"}};
const board=document.getElementById("board");
for(const s of sets){
  const m=META[s];if(!m)continue;
  const sec=document.createElement("div");sec.className="set";
  sec.innerHTML=`<h2>${m.t}</h2><div class="sub">${m.sub}</div>`;
  const g=document.createElement("div");g.className="grid";
  for(const[ch,ro,word,gloss]of m.data){
    const d=document.createElement("div");
    if(!ch){d.className="cell blank";g.appendChild(d);continue}
    d.className="cell";
    d.innerHTML=`<span class="k">${ch}</span><span class="r">${ro}</span>`
      +(word?`<span class="w">${word}</span><span class="wg">${wordRomaji(word)} — ${gloss}</span>`
             :`<span class="w">&nbsp;</span><span class="wg">${gloss}</span>`);
    g.appendChild(d);
  }
  sec.appendChild(g);board.appendChild(sec);
}
</script>
</body>
</html>
